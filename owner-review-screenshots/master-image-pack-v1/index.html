<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROVEXO Master Image Pack v1</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: #fff; color: #111; }
    header { padding: 16px; border-bottom: 1px solid #e5e7eb; }
    h1 { margin: 0; font-size: 16px; font-weight: 700; }
    p { margin: 6px 0 0; font-size: 13px; color: #64748b; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 16px; }
    figure { margin: 0; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; background: #f8fafc; }
    figcaption { padding: 8px 10px; font-size: 12px; font-weight: 600; border-bottom: 1px solid #e5e7eb; background: #fff; }
    img { display: block; width: 100%; height: auto; background: #fff; }
    .pending { padding: 16px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <header>
    <h1>ROVEXO Master Image Pack v1 — Absolute Final</h1>
    <p>Phone width · standard / classic / compact · purple / white / black / grey · 16px inset</p>
    <p>Baseline captures from develop preview. Full hub pack refreshes after Master Preview deploy of Absolute Final rebuild.</p>
  </header>
  <div class="grid">
    <figure>
      <figcaption>Login</figcaption>
      <img src="01-login.png" alt="Login" />
    </figure>
    <figure>
      <figcaption>My Account (baseline preview)</figcaption>
      <img src="02-account.png" alt="My Account" />
    </figure>
    <figure>
      <figcaption>Buying / Selling / Business / Wallet / Messages / Trust / Settings / Search / Checkout / Tracking / Orders / Reviews / Directory / Notifications / Saved / Help / Legal</figcaption>
      <p class="pending">Capture via <code>scripts/master-image-pack.mjs</code> after Absolute Final push lands on Master Preview.</p>
    </figure>
  </div>
</body>
</html>
