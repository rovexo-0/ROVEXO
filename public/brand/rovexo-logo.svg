<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="ROVEXO mark">
  <!--
    Canonical RX app icon — Splash Icon Final Polish (pre-freeze).
    KEEP: RX · black plate · white R · purple X · rounded corners.
    POLISH: −~8% X thickness · softer plate radius · refined purple · crisper small sizes.
  -->
  <defs>
    <linearGradient id="rx-bg" x1="120" y1="88" x2="904" y2="936" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.45" stop-color="#0B1224"/>
      <stop offset="1" stop-color="#05070E"/>
    </linearGradient>
    <linearGradient id="rx-x" x1="580" y1="270" x2="850" y2="770" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B794F6"/>
      <stop offset="0.4" stop-color="#9F6AF5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="rx-shine" x1="180" y1="140" x2="560" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Softer squircle -->
  <rect x="88" y="88" width="848" height="848" rx="228" fill="url(#rx-bg)"/>
  <rect x="88" y="88" width="848" height="848" rx="228" fill="url(#rx-shine)"/>

  <g transform="translate(512 512) scale(1.04) translate(-512 -512)">
    <!-- White R -->
    <path
      fill="#FFFFFF"
      d="M232 740V284h132c68 0 108 36 108 94 0 41-19 70-54 84l72 278h-72L350 490H312v250H232Zm78-298h64c30 0 48-15 48-42s-18-42-48-42h-64v84Z"
    />
    <!-- Purple X — ~8% thinner arms than prior polish -->
    <path
      fill="url(#rx-x)"
      d="M588 288l116 224L588 736h74l76-140 76 140h74L722 512l142-224h-74l-76 138L662 288h-74Z"
    />
  </g>
</svg>
