<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="ROVEXO">
  <!--
    Official RX icon — UI polish only (pre-approval).
    KEEP: RX · black plate · white R · purple X · rounded square.
    POLISH: elegant thinner X · softer radius/shadow · optical balance · small-size clarity.
  -->
  <defs>
    <linearGradient id="rx-bg" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080B14"/>
      <stop offset="0.48" stop-color="#0B1224"/>
      <stop offset="1" stop-color="#060810"/>
    </linearGradient>
    <linearGradient id="rx-x" x1="590" y1="280" x2="860" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.45" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="rx-shine" x1="200" y1="150" x2="540" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Softer luxury squircle -->
  <rect x="90" y="90" width="844" height="844" rx="240" fill="url(#rx-bg)"/>
  <rect x="90" y="90" width="844" height="844" rx="240" fill="url(#rx-shine)"/>

  <!-- Optical center — slight left bias on R, breathing room before X -->
  <g transform="translate(512 512) scale(1.03) translate(-512 -512)">
    <!-- White R — open counter, balanced stem -->
    <path
      fill="#FFFFFF"
      d="M236 736V288h128c66 0 104 35 104 92 0 40-18 68-52 82l68 274h-70L348 492H312v244H236Zm76-292h62c28 0 46-14 46-40s-18-40-46-40h-62v80Z"
    />
    <!-- Elegant purple X — ~8% thinner arms, clearer silhouette -->
    <path
      fill="url(#rx-x)"
      d="M600 296l108 216L600 728h66l72-132 72 132h66L734 512l134-216h-66l-72 130L666 296h-66Z"
    />
  </g>
</svg>
